name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: DBI Backend ${{ github.ref_name }}
          body: |
            See the [README](https://github.com/${{ github.repository }}#readme) for usage instructions.

            ## Downloads

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `DBI-Backend-${{ github.ref_name }}-macOS-arm64.dmg` |
            | macOS (Intel) | `DBI-Backend-${{ github.ref_name }}-macOS-x64.dmg` |
            | Windows | `DBI-Backend-${{ github.ref_name }}-Windows-x64-setup.exe` |
            | Windows (MSI) | `DBI-Backend-${{ github.ref_name }}-Windows-x64.msi` |
            | Linux (deb) | `DBI-Backend-${{ github.ref_name }}-Linux-x64.deb` |
            | Linux (AppImage) | `DBI-Backend-${{ github.ref_name }}-Linux-x64.AppImage` |
            | Linux (rpm) | `DBI-Backend-${{ github.ref_name }}-Linux-x64.rpm` |
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libusb-1.0-0-dev \
            libudev-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Rename & upload artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # .dmg
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "DBI-Backend-${VERSION}-${{ matrix.label }}.dmg"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}.dmg" --clobber
          fi

      - name: Rename & upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}"
          $BUNDLE_DIR = "src-tauri/target/${{ matrix.target }}/release/bundle"

          # .exe (NSIS installer)
          $exe = Get-ChildItem "$BUNDLE_DIR/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($exe) {
            Copy-Item $exe.FullName "DBI-Backend-${VERSION}-${{ matrix.label }}-setup.exe"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}-setup.exe" --clobber
          }

          # .msi
          $msi = Get-ChildItem "$BUNDLE_DIR/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "DBI-Backend-${VERSION}-${{ matrix.label }}.msi"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}.msi" --clobber
          }

      - name: Rename & upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BUNDLE_DIR="src-tauri/target/${{ matrix.target }}/release/bundle"

          # .deb
          DEB=$(find "$BUNDLE_DIR/deb" -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "DBI-Backend-${VERSION}-${{ matrix.label }}.deb"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}.deb" --clobber
          fi

          # .AppImage
          APPIMAGE=$(find "$BUNDLE_DIR/appimage" -name "*.AppImage" | head -1)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "DBI-Backend-${VERSION}-${{ matrix.label }}.AppImage"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}.AppImage" --clobber
          fi

          # .rpm
          RPM=$(find "$BUNDLE_DIR/rpm" -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "DBI-Backend-${VERSION}-${{ matrix.label }}.rpm"
            gh release upload "$VERSION" "DBI-Backend-${VERSION}-${{ matrix.label }}.rpm" --clobber
          fi
